<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroTiles | Daily Puzzle Challenge</title>
    <style>
        :root {
            /* NeuroTiles Theme: Cyberpunk Purple/Cyan */
            --primary: #bc13fe; 
            --primary-hover: #d35aff;
            --secondary: #00f3ff;
            --bg: #0b0b15;
            --surface: #161625;
            --text: #ffffff;
            --accent: #232336;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            display: flex;
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            background: var(--surface);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid #333;
        }

        /* Branding Section */
        .brand-logo {
            font-size: 28px;
            font-weight: 900;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.5);
        }
        .brand-logo span { color: var(--primary); }

        .left-panel { flex: 1; max-width: 320px; }
        
        /* Stats Dashboard */
        .stats-container {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--accent);
            padding: 15px;
            border-radius: 12px;
            flex: 1;
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }
        .stat-value { font-size: 22px; font-weight: 800; display: block; color: #fff; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #888; letter-spacing: 1px; }

        /* Level Selector */
        .level-select {
            margin: 20px 0;
            display: flex;
            background: #08080f;
            padding: 5px;
            border-radius: 50px;
            justify-content: space-between;
        }
        .level-btn {
            background: transparent;
            border: none;
            color: #888;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
            flex: 1;
        }
        .level-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
        }

        /* Visual Hint & Crop */
        .visual-hint { margin-top: 20px; }
        .visual-hint-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;}
        .visual-hint p { font-size: 12px; color: #aaa; margin: 0; }
        .badge { background: var(--secondary); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        
        .preview-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
        }
        .preview-image {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            border: 2px solid #333;
            object-fit: cover;
        }
        .loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--primary);
            font-weight: bold;
            display: none;
        }

        .crop-controls {
            background: #08080f;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .crop-controls label { font-size: 11px; color: #888; display: block; margin-bottom: 5px; }
        input[type=range] { width: 100%; accent-color: var(--primary); cursor: pointer; }

        /* Game Grid */
        .right-panel { flex: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .puzzle-grid {
            display: grid;
            gap: 5px;
            background: #000;
            padding: 5px;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.15);
            border: 2px solid #222;
            touch-action: manipulation; 
            user-select: none;
            -webkit-user-select: none;
        }

        .puzzle-tile {
            cursor: pointer;
            position: relative;
            background-repeat: no-repeat;
            transition: transform 0.1s ease-out;
            border-radius: 4px;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        .puzzle-tile:hover:not(.empty-tile) { filter: brightness(1.2); z-index: 10; border: 1px solid var(--secondary); }

        .tile-number {
            position: absolute;
            top: 6px; right: 6px;
            background: rgba(0,0,0,0.7);
            color: var(--secondary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            pointer-events: none !important; 
        }

        .empty-tile { background: transparent !important; box-shadow: inset 0 0 10px rgba(255,255,255,0.05); }

        /* Buttons */
        .btn-group { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .btn {
            background: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(188, 19, 254, 0.3); }
        
        .btn-secondary { background: transparent; border: 2px solid #333; color: #aaa; }
        .btn-secondary:hover { border-color: var(--secondary); color: #fff; background: rgba(0, 243, 255, 0.05); }

        /* Win Message */
        .message {
            position: fixed;
            top: 20px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #000;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; padding: 20px; }
            .left-panel { max-width: 100%; }
            .puzzle-grid { transform: scale(0.95); }
        }
    </style>
</head>
<body>

<div id="winMsg" class="message">🧠 NEURAL PATHWAY CONNECTED!</div>

<div class="main-container">
    <div class="left-panel">
        <div class="brand-logo">🧠 Neuro<span>Tiles</span></div>
        
        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-value" id="timer">00:00</span>
                <span class="stat-label">Timer</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="moves">0</span>
                <span class="stat-label">Moves</span>
            </div>
        </div>

        <div class="level-select">
            <button class="level-btn active" onclick="changeLevel(3, this)">Easy</button>
            <button class="level-btn" onclick="changeLevel(4, this)">Medium</button>
            <button class="level-btn" onclick="changeLevel(5, this)">Hard</button>
        </div>

        <div class="visual-hint">
            <div class="visual-hint-header">
                <p>Target Image:</p>
                <span id="imgSourceLabel" class="badge">Daily Challenge</span>
            </div>
            
            <div class="preview-wrapper">
                <div id="loadingText" class="loader">Loading...</div>
                <img id="previewImage" class="preview-image" src="" alt="Hint">
            </div>
            
            <div id="cropControls" class="crop-controls">
                <label>Adjust View Area:</label>
                <input type="range" id="panRange" min="0" max="100" value="50">
            </div>
        </div>

        <div class="btn-group">
            <button class="btn" onclick="shuffleTiles()">🔀 Scramble Puzzle</button>
            
            <button class="btn btn-secondary" onclick="loadRandomImage()">🎲 Random Challenge</button>
            
            <label for="imageUpload" class="btn btn-secondary" style="display: block; text-align: center;">🖼️ Upload Photo</label>
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
        </div>
        
        <p style="font-size: 11px; color: #555; margin-top: 15px; line-height: 1.4; text-align:center;">
            Connect adjacent tiles or use Arrow Keys.
        </p>
    </div>

    <div class="right-panel">
        <div id="puzzleGrid" class="puzzle-grid"></div>
    </div>
</div>

<script>
    let gridSize = 3;
    let tiles = [];
    let emptyIndex;
    let moves = 0;
    let timerInterval;
    let seconds = 0;
    let gameStarted = false;
    let solved = false;
    let currentImageBase = ''; 
    let rawImage = new Image(); 

    const gridEl = document.getElementById('puzzleGrid');
    const movesEl = document.getElementById('moves');
    const timerEl = document.getElementById('timer');
    const winMsg = document.getElementById('winMsg');
    const panRange = document.getElementById('panRange');
    const previewImg = document.getElementById('previewImage');
    const labelEl = document.getElementById('imgSourceLabel');
    const loader = document.getElementById('loadingText');

    // --- 1. GAME LOGIC ---

    function initGame() {
        tiles = Array.from({length: gridSize * gridSize}, (_, i) => i);
        emptyIndex = tiles.length - 1;
        solved = false;
        moves = 0;
        seconds = 0;
        gameStarted = false;
        clearInterval(timerInterval);
        movesEl.textContent = "0";
        timerEl.textContent = "00:00";
        winMsg.style.display = 'none';
        render();
    }

    function render() {
        if (tiles.length === 0) return; // Guard clause

        const isMobile = window.innerWidth < 600;
        const totalSize = isMobile ? 300 : 450; 
        
        const tileSize = totalSize / gridSize;
        gridEl.style.gridTemplateColumns = `repeat(${gridSize}, ${tileSize}px)`;
        gridEl.style.gridTemplateRows = `repeat(${gridSize}, ${tileSize}px)`;
        gridEl.innerHTML = '';

        tiles.forEach((tileValue, index) => {
            const tile = document.createElement('div');
            tile.className = 'puzzle-tile';
            tile.style.width = `${tileSize}px`;
            tile.style.height = `${tileSize}px`;

            if (tileValue === tiles.length - 1 && !solved) {
                tile.classList.add('empty-tile');
            } else {
                const row = Math.floor(tileValue / gridSize);
                const col = tileValue % gridSize;
                
                // Use the processed canvas data
                tile.style.backgroundImage = `url(${currentImageBase})`;
                tile.style.backgroundSize = `${totalSize}px ${totalSize}px`;
                tile.style.backgroundPosition = `-${col * tileSize}px -${row * tileSize}px`;
                
                if(!solved) {
                    const num = document.createElement('span');
                    num.className = 'tile-number';
                    num.textContent = tileValue + 1;
                    tile.appendChild(num);
                }
            }
            tile.onclick = () => moveTile(index);
            gridEl.appendChild(tile);
        });
    }

    function moveTile(index) {
        if (solved) return;
        const r = Math.floor(index / gridSize), c = index % gridSize;
        const er = Math.floor(emptyIndex / gridSize), ec = emptyIndex % gridSize;

        if (Math.abs(r - er) + Math.abs(c - ec) === 1) {
            [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
            emptyIndex = index;
            moves++;
            movesEl.textContent = moves;
            if(!gameStarted) startTimer();
            render();
            checkWin();
        }
    }

    function startTimer() {
        gameStarted = true;
        timerInterval = setInterval(() => {
            seconds++;
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            timerEl.textContent = `${m}:${s}`;
        }, 1000);
    }

    function shuffleTiles() {
        initGame();
        for (let i = 0; i < gridSize * gridSize * 25; i++) {
            const neighbors = [];
            if (emptyIndex >= gridSize) neighbors.push(emptyIndex - gridSize);
            if (emptyIndex < gridSize * (gridSize - 1)) neighbors.push(emptyIndex + gridSize);
            if (emptyIndex % gridSize !== 0) neighbors.push(emptyIndex - 1);
            if (emptyIndex % gridSize !== gridSize - 1) neighbors.push(emptyIndex + 1);
            const move = neighbors[Math.floor(Math.random() * neighbors.length)];
            [tiles[move], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[move]];
            emptyIndex = move;
        }
        render();
    }

    function checkWin() {
        if (tiles.every((t, i) => t === i)) {
            solved = true;
            clearInterval(timerInterval);
            render();
            winMsg.style.display = 'block';
        }
    }

    function changeLevel(size, btn) {
        gridSize = size;
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        shuffleTiles();
    }

    // --- 2. IMAGE HANDLING LOGIC ---

    function loadDailyImage() {
        labelEl.textContent = "Daily Challenge";
        labelEl.style.background = "#00f3ff"; 
        
        const date = new Date();
        const seed = `${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()}`;
        const url = `https://picsum.photos/seed/${seed}/800/800`;
        
        loadImageFromURL(url);
    }

    function loadRandomImage() {
        labelEl.textContent = "Random Challenge";
        labelEl.style.background = "#bc13fe";
        const seed = Math.floor(Math.random() * 100000);
        const url = `https://picsum.photos/seed/${seed}/800/800`;
        loadImageFromURL(url);
    }

    function loadImageFromURL(url) {
        loader.style.display = 'block';
        previewImg.style.opacity = '0.3';
        
        rawImage = new Image();
        rawImage.crossOrigin = "Anonymous"; 
        
        rawImage.onload = () => {
            loader.style.display = 'none';
            previewImg.style.opacity = '1';
            panRange.value = 50; 
            processImage();
            shuffleTiles(); // New Image = Scramble
        };
        
        rawImage.onerror = () => {
            alert("Failed to load image. Check internet connection.");
        };
        
        rawImage.src = url;
    }

    document.getElementById('imageUpload').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        labelEl.textContent = "Custom Upload";
        labelEl.style.background = "#fff";
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            rawImage = new Image();
            rawImage.onload = () => {
                panRange.value = 50;
                processImage();
                shuffleTiles(); // New Upload = Scramble
            };
            rawImage.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    // When Slider moves, ONLY render (do not scramble)
    panRange.oninput = () => {
        processImage();
        render(); 
    };

    function processImage() {
        if (!rawImage.src) return;

        const canvas = document.createElement('canvas');
        const size = 600; 
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        
        let minDim = Math.min(rawImage.width, rawImage.height);
        let sx = 0, sy = 0;
        let val = panRange.value / 100;

        if (rawImage.width > rawImage.height) {
            const maxScroll = rawImage.width - minDim;
            sx = maxScroll * val;
        } else {
            const maxScroll = rawImage.height - minDim;
            sy = maxScroll * val;
        }

        ctx.drawImage(rawImage, sx, sy, minDim, minDim, 0, 0, size, size);
        
        currentImageBase = canvas.toDataURL();
        previewImg.src = currentImageBase;
        // Does NOT call shuffleTiles() anymore
    }

    // Keyboard Controls
    document.addEventListener('keydown', (e) => {
        if(solved) return;
        let move = -1;
        if (e.key === 'ArrowUp' && emptyIndex < gridSize * (gridSize - 1)) move = emptyIndex + gridSize;
        if (e.key === 'ArrowDown' && emptyIndex >= gridSize) move = emptyIndex - gridSize;
        if (e.key === 'ArrowLeft' && emptyIndex % gridSize !== gridSize - 1) move = emptyIndex + 1;
        if (e.key === 'ArrowRight' && emptyIndex % gridSize !== 0) move = emptyIndex - 1;
        if (move !== -1) { e.preventDefault(); moveTile(move); }
    });

    window.onload = loadDailyImage;

</script>

</body>
</html>
