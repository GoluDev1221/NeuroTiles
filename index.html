<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroTiles | Cyberpunk Puzzle</title>
    <style>
        :root {
            /* NeuroTiles Theme */
            --primary: #bc13fe; 
            --primary-hover: #d35aff;
            --secondary: #00f3ff;
            --bg: #0b0b15;
            --surface: #161625;
            --text: #ffffff;
            --accent: #232336;
            --danger: #ff2a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden; /* Prevent scrolling on mobile */
        }

        /* --- LAYOUT CONTAINERS --- */
        .main-container {
            position: relative;
            max-width: 1100px;
            width: 100%;
            background: var(--surface);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid #333;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.4s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HOME SCREEN STYLES --- */
        #homeScreen {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 30px;
        }

        .hero-title {
            font-size: 60px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(188, 19, 254, 0.6);
        }
        .hero-title span { color: var(--primary); }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .setting-box {
            background: var(--accent);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #333;
            text-align: left;
        }
        .setting-box label { display: block; color: var(--secondary); margin-bottom: 10px; font-size: 14px; font-weight: bold; text-transform: uppercase; }
        
        select {
            width: 100%;
            padding: 12px;
            background: #0b0b15;
            color: white;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            cursor: pointer;
        }
        select:focus { border-color: var(--primary); }

        .play-btn {
            background: linear-gradient(90deg, var(--primary), #8a00c2);
            color: white;
            font-size: 24px;
            font-weight: 800;
            padding: 15px 80px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
        }
        .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(188, 19, 254, 0.6); }

        /* --- GAME SCREEN STYLES --- */
        #gameScreen {
            gap: 40px;
            height: 100%;
        }

        .left-panel { flex: 1; max-width: 320px; display: flex; flex-direction: column; gap: 15px; }
        .right-panel { flex: 2; display: flex; align-items: center; justify-content: center; }

        /* Stats */
        .stats-container { display: flex; gap: 12px; }
        .stat-card {
            background: var(--accent);
            padding: 10px;
            border-radius: 12px;
            flex: 1;
            text-align: center;
            border-bottom: 3px solid var(--primary);
        }
        .stat-value { font-size: 18px; font-weight: 800; display: block; color: #fff; }
        .stat-label { font-size: 9px; text-transform: uppercase; color: #888; letter-spacing: 1px; }
        .danger-text { color: var(--danger) !important; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Visual Hint */
        .visual-hint-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .badge { background: var(--secondary); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        
        .preview-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; max-height: 200px; }
        .preview-image { width: 100%; height: 100%; border-radius: 12px; border: 2px solid #333; object-fit: cover; }
        
        .crop-controls { background: #08080f; padding: 10px; border-radius: 10px; }
        .crop-controls label { font-size: 10px; color: #888; display: block; margin-bottom: 5px; }
        input[type=range] { width: 100%; accent-color: var(--primary); cursor: pointer; }

        /* Puzzle Grid */
        .puzzle-grid {
            display: grid;
            gap: 4px;
            background: #000;
            padding: 4px;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.15);
            border: 2px solid #222;
            touch-action: manipulation; 
        }

        .puzzle-tile {
            cursor: pointer;
            position: relative;
            background-repeat: no-repeat;
            transition: transform 0.1s ease-out;
            border-radius: 4px;
        }
        .puzzle-tile:hover:not(.empty-tile) { filter: brightness(1.2); z-index: 10; border: 1px solid var(--secondary); }

        .tile-number {
            position: absolute; top: 4px; right: 4px;
            background: rgba(0,0,0,0.7); color: var(--secondary);
            padding: 1px 5px; border-radius: 4px; font-size: 10px; font-weight: bold; pointer-events: none;
        }
        .empty-tile { background: transparent !important; }

        /* Buttons */
        .btn {
            background: var(--accent); color: white; padding: 10px; border: 1px solid #444;
            border-radius: 8px; cursor: pointer; font-weight: 600; text-transform: uppercase; font-size: 12px; transition: 0.2s; width: 100%;
        }
        .btn:hover { background: #333; border-color: var(--secondary); }
        .btn-primary { background: var(--primary); border: none; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { color: #ff6666; border-color: #552222; margin-top: auto; }
        .btn-danger:hover { background: #220000; border-color: red; }

        /* MODAL (Win/Lose) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--surface); padding: 40px; border-radius: 20px;
            text-align: center; border: 2px solid var(--primary);
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.5);
            max-width: 400px; width: 90%;
        }
        .modal-title { font-size: 32px; font-weight: 900; margin-bottom: 10px; }
        .modal-msg { color: #aaa; margin-bottom: 30px; }
        .win-title { color: var(--secondary); }
        .lose-title { color: var(--danger); }

        /* Mobile Responsive */
        @media (max-width: 900px) {
            .main-container { padding: 15px; min-height: 100vh; border-radius: 0; border: none; }
            #gameScreen { flex-direction: column; overflow-y: auto; }
            .left-panel { max-width: 100%; order: 2; }
            .right-panel { order: 1; margin-bottom: 20px; }
            .settings-grid { grid-template-columns: 1fr; }
            .puzzle-grid { transform: scale(0.95); }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div id="homeScreen" class="screen active">
        <div class="brand-logo">🧠 Neuro<span>Tiles</span></div>
        <h1 class="hero-title">Core<br><span>Crush</span></h1>
        
        <div class="settings-grid">
            <div class="setting-box">
                <label>Select Mode</label>
                <select id="diffSelect">
                    <option value="3">Easy (3x3)</option>
                    <option value="4" selected>Medium (4x4)</option>
                    <option value="5">Hard (5x5)</option>
                </select>
            </div>
            <div class="setting-box">
                <label>Time Limit</label>
                <select id="timeSelect">
                    <option value="0">Infinite</option>
                    <option value="60">1 Minute</option>
                    <option value="120">2 Minutes</option>
                    <option value="300">5 Minutes</option>
                </select>
            </div>
            <div class="setting-box">
                <label>Moves Limit</label>
                <select id="moveSelect">
                    <option value="0">Infinite</option>
                    <option value="50">50 Moves</option>
                    <option value="100">100 Moves</option>
                    <option value="200">200 Moves</option>
                </select>
            </div>
        </div>

        <button class="play-btn" onclick="startGame()">PLAY GAME</button>
    </div>

    <div id="gameScreen" class="screen">
        <div class="left-panel">
            <div class="visual-hint-header">
                <div class="brand-logo" style="font-size: 18px; margin: 0;">🧠 Neuro<span>Tiles</span></div>
                <button class="btn btn-danger" style="width: auto; padding: 5px 10px;" onclick="goHome()">Exit</button>
            </div>

            <div class="stats-container">
                <div class="stat-card">
                    <span class="stat-value" id="timerDisplay">00:00</span>
                    <span class="stat-label">Time</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="movesDisplay">0</span>
                    <span class="stat-label">Moves</span>
                </div>
            </div>

            <div class="visual-hint">
                <div class="visual-hint-header">
                    <p>Reference:</p>
                    <span id="imgSourceLabel" class="badge">Daily</span>
                </div>
                <div class="preview-wrapper">
                    <img id="previewImage" class="preview-image" src="" alt="Hint">
                </div>
                <div id="cropControls" class="crop-controls" style="margin-top: 5px;">
                    <label>Adjust View:</label>
                    <input type="range" id="panRange" min="0" max="100" value="50">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <button class="btn btn-primary" onclick="shuffleTiles()">🔄 Scramble</button>
                <button class="btn" onclick="loadRandomImage()">🎲 Random Img</button>
                <label for="imageUpload" class="btn" style="text-align: center; display: block; margin: 0;">📂 Upload</label>
            </div>
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
            
            <p style="font-size: 10px; color: #555; text-align:center;">Use Arrow Keys or Click tiles.</p>
        </div>

        <div class="right-panel">
            <div id="puzzleGrid" class="puzzle-grid"></div>
        </div>
    </div>
</div>

<div id="gameModal" class="modal-overlay">
    <div class="modal-content">
        <div id="modalTitle" class="modal-title"></div>
        <p id="modalMsg" class="modal-msg"></p>
        <button class="play-btn" style="font-size: 16px; padding: 10px 40px;" onclick="goHome()">Back to Home</button>
        <br><br>
        <button class="btn btn-secondary" onclick="restartLevel()">Replay Level</button>
    </div>
</div>

<script>
    // --- STATE VARIABLES ---
    let gridSize = 3;
    let tiles = [];
    let emptyIndex;
    let moves = 0;
    let timerSeconds = 0;
    let timerInterval;
    let gameActive = false;
    let currentImageBase = ''; 
    let rawImage = new Image(); 
    
    // Limits
    let limitTime = 0; // 0 = infinite
    let limitMoves = 0; // 0 = infinite

    // DOM Elements
    const homeScreen = document.getElementById('homeScreen');
    const gameScreen = document.getElementById('gameScreen');
    const gridEl = document.getElementById('puzzleGrid');
    const movesDisplay = document.getElementById('movesDisplay');
    const timerDisplay = document.getElementById('timerDisplay');
    const panRange = document.getElementById('panRange');
    const previewImg = document.getElementById('previewImage');
    const labelEl = document.getElementById('imgSourceLabel');
    const modal = document.getElementById('gameModal');

    // --- NAVIGATION ---
    
    function startGame() {
        // Read Settings
        gridSize = parseInt(document.getElementById('diffSelect').value);
        limitTime = parseInt(document.getElementById('timeSelect').value);
        limitMoves = parseInt(document.getElementById('moveSelect').value);

        // Switch Screens
        homeScreen.classList.remove('active');
        gameScreen.classList.add('active');

        // Init
        if(!rawImage.src) {
            loadDailyImage(); // Load image if first time
        } else {
            restartLevel(); // Just reset tiles
        }
    }

    function goHome() {
        clearInterval(timerInterval);
        modal.style.display = 'none';
        gameScreen.classList.remove('active');
        homeScreen.classList.add('active');
    }

    function restartLevel() {
        modal.style.display = 'none';
        panRange.value = 50; 
        processImage(); // Re-render image
        shuffleTiles(); // Re-scramble
    }

    // --- GAME LOGIC ---

    function initGameStats() {
        tiles = Array.from({length: gridSize * gridSize}, (_, i) => i);
        emptyIndex = tiles.length - 1;
        moves = 0;
        timerSeconds = 0;
        gameActive = true;
        
        clearInterval(timerInterval);
        updateStatsUI();
        render();
    }

    function updateStatsUI() {
        // Moves Logic
        if (limitMoves > 0) {
            movesDisplay.textContent = `${moves} / ${limitMoves}`;
            if(moves >= limitMoves) movesDisplay.classList.add('danger-text');
            else movesDisplay.classList.remove('danger-text');
        } else {
            movesDisplay.textContent = moves;
        }

        // Time Logic
        let displaySec = limitTime > 0 ? (limitTime - timerSeconds) : timerSeconds;
        if(displaySec < 0) displaySec = 0;
        
        const m = Math.floor(displaySec / 60).toString().padStart(2, '0');
        const s = (displaySec % 60).toString().padStart(2, '0');
        timerDisplay.textContent = `${m}:${s}`;
        
        if(limitTime > 0 && displaySec <= 10) timerDisplay.classList.add('danger-text');
        else timerDisplay.classList.remove('danger-text');
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if(!gameActive) return;
            timerSeconds++;
            updateStatsUI();

            // Check Time Loss
            if (limitTime > 0 && timerSeconds >= limitTime) {
                endGame(false, "Time's Up!");
            }
        }, 1000);
    }

    function moveTile(index) {
        if (!gameActive) return;
        
        const r = Math.floor(index / gridSize), c = index % gridSize;
        const er = Math.floor(emptyIndex / gridSize), ec = emptyIndex % gridSize;

        if (Math.abs(r - er) + Math.abs(c - ec) === 1) {
            // Swap
            [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
            emptyIndex = index;
            moves++;
            
            // Start Timer on first move if not running
            if (moves === 1) startTimer();

            updateStatsUI();
            render();
            
            // Check Move Loss
            if (limitMoves > 0 && moves >= limitMoves) {
                // Check if they won on the very last allowed move
                if (checkWinCondition()) {
                    endGame(true);
                } else {
                    endGame(false, "Out of Moves!");
                }
                return;
            }

            // Check Win
            if (checkWinCondition()) {
                endGame(true);
            }
        }
    }

    function checkWinCondition() {
        return tiles.every((t, i) => t === i);
    }

    function endGame(win, reason = "") {
        gameActive = false;
        clearInterval(timerInterval);
        modal.style.display = 'flex';
        
        const title = document.getElementById('modalTitle');
        const msg = document.getElementById('modalMsg');

        if (win) {
            title.textContent = "VICTORY!";
            title.className = "modal-title win-title";
            msg.textContent = `You solved the puzzle in ${moves} moves!`;
        } else {
            title.textContent = "GAME OVER";
            title.className = "modal-title lose-title";
            msg.textContent = reason || "Better luck next time.";
        }
    }

    function render() {
        if (tiles.length === 0) return;

        const isMobile = window.innerWidth < 600;
        const totalSize = isMobile ? 300 : 450; 
        const tileSize = totalSize / gridSize;
        
        gridEl.style.gridTemplateColumns = `repeat(${gridSize}, ${tileSize}px)`;
        gridEl.style.gridTemplateRows = `repeat(${gridSize}, ${tileSize}px)`;
        gridEl.innerHTML = '';

        tiles.forEach((tileValue, index) => {
            const tile = document.createElement('div');
            tile.className = 'puzzle-tile';
            tile.style.width = `${tileSize}px`;
            tile.style.height = `${tileSize}px`;

            if (tileValue === tiles.length - 1 && gameActive) {
                tile.classList.add('empty-tile');
            } else {
                const row = Math.floor(tileValue / gridSize);
                const col = tileValue % gridSize;
                
                tile.style.backgroundImage = `url(${currentImageBase})`;
                tile.style.backgroundSize = `${totalSize}px ${totalSize}px`;
                tile.style.backgroundPosition = `-${col * tileSize}px -${row * tileSize}px`;
                
                if(gameActive) {
                    const num = document.createElement('span');
                    num.className = 'tile-number';
                    num.textContent = tileValue + 1;
                    tile.appendChild(num);
                }
            }
            tile.onclick = () => moveTile(index);
            gridEl.appendChild(tile);
        });
    }

    function shuffleTiles() {
        initGameStats();
        // Solvable shuffle
        for (let i = 0; i < gridSize * gridSize * 25; i++) {
            const neighbors = [];
            if (emptyIndex >= gridSize) neighbors.push(emptyIndex - gridSize);
            if (emptyIndex < gridSize * (gridSize - 1)) neighbors.push(emptyIndex + gridSize);
            if (emptyIndex % gridSize !== 0) neighbors.push(emptyIndex - 1);
            if (emptyIndex % gridSize !== gridSize - 1) neighbors.push(emptyIndex + 1);
            const move = neighbors[Math.floor(Math.random() * neighbors.length)];
            [tiles[move], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[move]];
            emptyIndex = move;
        }
        render();
    }

    // --- IMAGE HANDLING ---

    function loadDailyImage() {
        labelEl.textContent = "Daily Challenge";
        labelEl.style.background = "#00f3ff"; 
        const date = new Date();
        const seed = `${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()}`;
        loadImageFromURL(`https://picsum.photos/seed/${seed}/800/800`);
    }

    function loadRandomImage() {
        labelEl.textContent = "Random Challenge";
        labelEl.style.background = "#bc13fe";
        const seed = Math.floor(Math.random() * 100000);
        loadImageFromURL(`https://picsum.photos/seed/${seed}/800/800`);
    }

    function loadImageFromURL(url) {
        previewImg.style.opacity = '0.3';
        rawImage = new Image();
        rawImage.crossOrigin = "Anonymous"; 
        rawImage.onload = () => {
            previewImg.style.opacity = '1';
            panRange.value = 50; 
            processImage();
            shuffleTiles(); // New Image = Reset Game
        };
        rawImage.src = url;
    }

    document.getElementById('imageUpload').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        labelEl.textContent = "Custom Upload";
        labelEl.style.background = "#fff";
        const reader = new FileReader();
        reader.onload = (ev) => {
            rawImage = new Image();
            rawImage.onload = () => {
                panRange.value = 50;
                processImage();
                shuffleTiles();
            };
            rawImage.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    panRange.oninput = () => {
        processImage();
        render(); // Just re-draw, don't shuffle
    };

    function processImage() {
        if (!rawImage.src) return;
        const canvas = document.createElement('canvas');
        const size = 600; 
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        
        let minDim = Math.min(rawImage.width, rawImage.height);
        let sx = 0, sy = 0;
        let val = panRange.value / 100;

        if (rawImage.width > rawImage.height) {
            sx = (rawImage.width - minDim) * val;
        } else {
            sy = (rawImage.height - minDim) * val;
        }

        ctx.drawImage(rawImage, sx, sy, minDim, minDim, 0, 0, size, size);
        currentImageBase = canvas.toDataURL();
        previewImg.src = currentImageBase;
    }

    // Keyboard
    document.addEventListener('keydown', (e) => {
        if(!gameActive) return;
        let move = -1;
        if (e.key === 'ArrowUp' && emptyIndex < gridSize * (gridSize - 1)) move = emptyIndex + gridSize;
        if (e.key === 'ArrowDown' && emptyIndex >= gridSize) move = emptyIndex - gridSize;
        if (e.key === 'ArrowLeft' && emptyIndex % gridSize !== gridSize - 1) move = emptyIndex + 1;
        if (e.key === 'ArrowRight' && emptyIndex % gridSize !== 0) move = emptyIndex - 1;
        if (move !== -1) { e.preventDefault(); moveTile(move); }
    });

</script>

</body>
</html>
