<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Crush | Image Puzzle Pro</title>
    <style>
        :root {
            --primary: #ff3e3e; /* Core Crush Red */
            --bg: #0f0f0f;
            --surface: #1e1e1e;
            --text: #ffffff;
            --accent: #2a2a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            display: flex;
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            background: var(--surface);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid #333;
        }

        /* Branding Section */
        .brand-logo {
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .left-panel { flex: 1; max-width: 320px; }
        
        /* Stats Dashboard */
        .stats-container {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--accent);
            padding: 15px;
            border-radius: 12px;
            flex: 1;
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }
        .stat-value { font-size: 22px; font-weight: 800; display: block; color: #fff; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #888; letter-spacing: 1px; }

        /* Level Selector */
        .level-select {
            margin: 20px 0;
            display: flex;
            background: #111;
            padding: 5px;
            border-radius: 50px;
            justify-content: space-between;
        }
        .level-btn {
            background: transparent;
            border: none;
            color: #888;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
            flex: 1;
        }
        .level-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 62, 62, 0.3);
        }

        /* Visual Hint & Crop */
        .visual-hint { margin-top: 20px; }
        .visual-hint p { font-size: 12px; color: #666; margin-bottom: 8px; }
        .preview-image {
            width: 100%;
            border-radius: 12px;
            border: 2px solid #333;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .crop-controls {
            background: #111;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
        }
        .crop-controls label { font-size: 11px; color: #888; display: block; margin-bottom: 5px; }
        input[type=range] { width: 100%; accent-color: var(--primary); cursor: pointer; }

        /* Game Grid */
        .right-panel { flex: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .puzzle-grid {
            display: grid;
            gap: 5px;
            background: #000;
            padding: 5px;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 62, 62, 0.15);
            border: 2px solid #222;
            
            /* Touch fixes */
            touch-action: manipulation; 
            user-select: none;
            -webkit-user-select: none;
        }

        .puzzle-tile {
            cursor: pointer;
            position: relative;
            background-repeat: no-repeat;
            transition: transform 0.1s ease-out;
            border-radius: 4px;
            
            /* Text highlight fixes */
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        .puzzle-tile:hover:not(.empty-tile) { filter: brightness(1.2); z-index: 10; }

        .tile-number {
            position: absolute;
            top: 6px; right: 6px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            
            /* Ignore clicks on number */
            pointer-events: none !important; 
        }

        .empty-tile { background: transparent !important; box-shadow: inset 0 0 10px rgba(255,255,255,0.05); }

        /* Buttons */
        .btn-group { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .btn {
            background: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn:hover { background: #ff5555; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 62, 62, 0.4); }
        .btn-secondary { background: transparent; border: 2px solid #333; color: #aaa; }
        .btn-secondary:hover { border-color: #555; color: #fff; background: transparent; }

        /* Win Message */
        .message {
            position: fixed;
            top: 20px;
            background: #28a745;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 800;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown { from { top: -100px; } to { top: 20px; } }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; padding: 20px; }
            .left-panel { max-width: 100%; }
            .puzzle-grid { transform: scale(0.8); }
        }
    </style>
</head>
<body>

<div id="winMsg" class="message">🏆 CORE CRUSH CHAMPION! 🏆</div>

<div class="main-container">
    <div class="left-panel">
        <div class="brand-logo">🔴 Core Crush</div>
        
        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-value" id="timer">00:00</span>
                <span class="stat-label">Timer</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="moves">0</span>
                <span class="stat-label">Moves</span>
            </div>
        </div>

        <div class="level-select">
            <button class="level-btn active" onclick="changeLevel(3, this)">Easy</button>
            <button class="level-btn" onclick="changeLevel(4, this)">Medium</button>
            <button class="level-btn" onclick="changeLevel(5, this)">Hard</button>
        </div>

        <div class="visual-hint">
            <p>Reference Image:</p>
            <img id="previewImage" class="preview-image" src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500&h=500&fit=crop" alt="Hint">
            
            <div id="cropControls" class="crop-controls">
                <label>Adjust View Area:</label>
                <input type="range" id="panRange" min="0" max="100" value="50">
            </div>
        </div>

        <div class="btn-group">
            <button class="btn" onclick="shuffleTiles()">🔀 Scramble Puzzle</button>
            <label for="imageUpload" class="btn btn-secondary" style="display: block; text-align: center;">🖼️ Upload Photo</label>
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
        </div>
        
        <p style="font-size: 11px; color: #444; margin-top: 15px; line-height: 1.4;">
            Instructions: Click tiles adjacent to the empty spot to move them, or use Arrow Keys. Solve the puzzle to see the full image!
        </p>
    </div>

    <div class="right-panel">
        <div id="puzzleGrid" class="puzzle-grid"></div>
    </div>
</div>

<script>
    let gridSize = 3;
    let tiles = [];
    let emptyIndex;
    let moves = 0;
    let timerInterval;
    let seconds = 0;
    let gameStarted = false;
    let solved = false;
    let currentImageBase = document.getElementById('previewImage').src;
    let rawImage = null;

    const gridEl = document.getElementById('puzzleGrid');
    const movesEl = document.getElementById('moves');
    const timerEl = document.getElementById('timer');
    const winMsg = document.getElementById('winMsg');
    const panRange = document.getElementById('panRange');
    const cropControls = document.getElementById('cropControls');

    // Setup Game
    function initGame() {
        tiles = Array.from({length: gridSize * gridSize}, (_, i) => i);
        emptyIndex = tiles.length - 1;
        solved = false;
        moves = 0;
        seconds = 0;
        gameStarted = false;
        clearInterval(timerInterval);
        movesEl.textContent = "0";
        timerEl.textContent = "00:00";
        winMsg.style.display = 'none';
        render();
    }

    // Render Grid
    function render() {
        const totalSize = 450; 
        const tileSize = totalSize / gridSize;
        gridEl.style.gridTemplateColumns = `repeat(${gridSize}, ${tileSize}px)`;
        gridEl.style.gridTemplateRows = `repeat(${gridSize}, ${tileSize}px)`;
        gridEl.innerHTML = '';

        tiles.forEach((tileValue, index) => {
            const tile = document.createElement('div');
            tile.className = 'puzzle-tile';
            tile.style.width = `${tileSize}px`;
            tile.style.height = `${tileSize}px`;

            if (tileValue === tiles.length - 1 && !solved) {
                tile.classList.add('empty-tile');
            } else {
                const row = Math.floor(tileValue / gridSize);
                const col = tileValue % gridSize;
                tile.style.backgroundImage = `url(${currentImageBase})`;
                tile.style.backgroundSize = `${totalSize}px ${totalSize}px`;
                tile.style.backgroundPosition = `-${col * tileSize}px -${row * tileSize}px`;
                
                if(!solved) {
                    const num = document.createElement('span');
                    num.className = 'tile-number';
                    num.textContent = tileValue + 1;
                    tile.appendChild(num);
                }
            }
            tile.onclick = () => moveTile(index);
            gridEl.appendChild(tile);
        });
    }

    function moveTile(index) {
        if (solved) return;
        const r = Math.floor(index / gridSize), c = index % gridSize;
        const er = Math.floor(emptyIndex / gridSize), ec = emptyIndex % gridSize;

        if (Math.abs(r - er) + Math.abs(c - ec) === 1) {
            [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
            emptyIndex = index;
            moves++;
            movesEl.textContent = moves;
            if(!gameStarted) startTimer();
            render();
            checkWin();
        }
    }

    function startTimer() {
        gameStarted = true;
        timerInterval = setInterval(() => {
            seconds++;
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            timerEl.textContent = `${m}:${s}`;
        }, 1000);
    }

    function shuffleTiles() {
        initGame();
        // Solvable shuffle
        for (let i = 0; i < gridSize * gridSize * 20; i++) {
            const neighbors = [];
            if (emptyIndex >= gridSize) neighbors.push(emptyIndex - gridSize);
            if (emptyIndex < gridSize * (gridSize - 1)) neighbors.push(emptyIndex + gridSize);
            if (emptyIndex % gridSize !== 0) neighbors.push(emptyIndex - 1);
            if (emptyIndex % gridSize !== gridSize - 1) neighbors.push(emptyIndex + 1);
            const move = neighbors[Math.floor(Math.random() * neighbors.length)];
            [tiles[move], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[move]];
            emptyIndex = move;
        }
        render();
    }

    function checkWin() {
        if (tiles.every((t, i) => t === i)) {
            solved = true;
            clearInterval(timerInterval);
            render();
            winMsg.style.display = 'block';
        }
    }

    function changeLevel(size, btn) {
        gridSize = size;
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        shuffleTiles();
    }

    // Keyboard Controls
    document.addEventListener('keydown', (e) => {
        if(solved) return;
        let move = -1;
        if (e.key === 'ArrowUp' && emptyIndex < gridSize * (gridSize - 1)) move = emptyIndex + gridSize;
        if (e.key === 'ArrowDown' && emptyIndex >= gridSize) move = emptyIndex - gridSize;
        if (e.key === 'ArrowLeft' && emptyIndex % gridSize !== gridSize - 1) move = emptyIndex + 1;
        if (e.key === 'ArrowRight' && emptyIndex % gridSize !== 0) move = emptyIndex - 1;
        if (move !== -1) { e.preventDefault(); moveTile(move); }
    });

    // Image & Cropping
    document.getElementById('imageUpload').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            rawImage = new Image();
            rawImage.onload = () => {
                cropControls.style.display = 'block';
                processImage();
            };
            rawImage.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    panRange.oninput = processImage;

    function processImage() {
        if (!rawImage) return;
        const canvas = document.createElement('canvas');
        canvas.width = 500; canvas.height = 500;
        const ctx = canvas.getContext('2d');
        
        let minDim = Math.min(rawImage.width, rawImage.height);
        let sx = 0, sy = 0;
        let val = panRange.value / 100;

        if (rawImage.width > rawImage.height) {
            sx = (rawImage.width - minDim) * val;
        } else {
            sy = (rawImage.height - minDim) * val;
        }

        ctx.drawImage(rawImage, sx, sy, minDim, minDim, 0, 0, 500, 500);
        currentImageBase = canvas.toDataURL();
        document.getElementById('previewImage').src = currentImageBase;
        shuffleTiles();
    }

    // Initial shuffle on load
    setTimeout(shuffleTiles, 100);
</script>

</body>
</html>
